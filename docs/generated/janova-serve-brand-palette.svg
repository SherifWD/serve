<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Janova Serve POS brand palette">
  <defs>
    <style>
      .title { font: 800 58px Arial, Helvetica, sans-serif; fill: #081225; }
      .subtitle { font: 500 24px Arial, Helvetica, sans-serif; fill: #445066; }
      .section { font: 800 28px Arial, Helvetica, sans-serif; fill: #081225; }
      .label { font: 800 18px Arial, Helvetica, sans-serif; fill: #081225; }
      .meta { font: 600 16px Arial, Helvetica, sans-serif; fill: #5D6678; }
      .small { font: 500 15px Arial, Helvetica, sans-serif; fill: #445066; }
      .hex-light { font: 800 18px Arial, Helvetica, sans-serif; fill: #FFFFFF; }
      .hex-dark { font: 800 18px Arial, Helvetica, sans-serif; fill: #081225; }
    </style>
    <filter id="sheet-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#081225" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#F5F7FB"/>
  <rect x="60" y="54" width="1480" height="232" rx="32" fill="#081225"/>
  <g transform="translate(92 88)">
    <rect width="600" height="160" rx="26" fill="#081225" stroke="#163A73" stroke-width="2"/>
    <g transform="translate(30 14) scale(0.6)">
      <path d="M60 14c-25-3-42 6-54 26-10 16-13 38-7 59 3 11 10 21 18 27 5 4 11 1 11-6 0-17 11-27 31-27h88c31-14 53-40 69-80 2-6-1-10-8-10H92c-14 0-20 5-32 4Z" fill="#0070E0"/>
      <path d="M38 80c-16 0-26 10-26 24 0 15 11 24 28 24h29l-25 36c-13 18-30 31-53 38 26 19 59 27 98 25 66-4 112-37 133-94 8-22 5-42-8-54-9-9-22-13-38-13h-38l-28 40c-7 10-20 4-16-8 3-11 13-25 25-42H38Z" fill="#1060A0"/>
      <path d="M21 56h47l8-8h32l8 8h64M34 76h62l9 9h42l9-9h36M64 145l42-42v-17l26-26M93 153l38-38h20l31-31" stroke="#D0E0F0" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.85"/>
      <circle cx="88" cy="56" r="5" fill="#D0E0F0"/>
      <circle cx="142" cy="76" r="5" fill="#D0E0F0"/>
      <circle cx="106" cy="103" r="5" fill="#D0E0F0"/>
      <circle cx="132" cy="115" r="5" fill="#D0E0F0"/>
      <path d="M46 78c21-10 50-11 85-3 26 6 54 6 86 0-3 16-10 25-22 28H60c-15 0-23 5-28 13-5-17 0-31 14-38Z" fill="#FFFFFF" opacity="0.96"/>
    </g>
    <text x="220" y="68" fill="#F0F0F0" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" letter-spacing="1">JANOVA SERVE</text>
    <text x="222" y="104" fill="#70A0C0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="6">RESTAURANT POS</text>
    <path d="M222 124h282" stroke="#1060A0" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="710" y="132" class="hex-light" style="font-size:42px;">Janova Serve POS</text>
  <text x="712" y="176" fill="#D0E0F0" style="font:600 22px Arial, Helvetica, sans-serif;">Restaurant-first POS product identity</text>
  <text x="712" y="214" fill="#70A0C0" style="font:600 18px Arial, Helvetica, sans-serif;">Same Janova ribbon, circuit trace, blue glow, and engraved serif direction.</text>
  <text x="712" y="244" fill="#70A0C0" style="font:600 18px Arial, Helvetica, sans-serif;">Adapted for the restaurant POS solution.</text>

  <text x="60" y="362" class="title">Logo And Color Palette</text>
  <text x="62" y="402" class="subtitle">Source checked from public/images/janova-blue.png and public/images/janova-light.png.</text>
  <text x="62" y="434" class="subtitle">Dominant sampled colors include #102070, #1060A0, #0070E0, #70A0C0, #D0E0F0, and #F0F0F0.</text>

  <g transform="translate(60 482)">
    <text x="0" y="0" class="section">Brand Palette</text>
    <g transform="translate(0 30)">
      <rect x="0" y="0" width="188" height="128" rx="22" fill="#102070" filter="url(#sheet-shadow)"/>
      <text x="22" y="50" class="hex-light">#102070</text>
      <text x="22" y="82" fill="#D0E0F0" style="font:600 15px Arial;">Janova Navy</text>
      <text x="22" y="106" fill="#D0E0F0" style="font:500 13px Arial;">Primary mark</text>

      <rect x="214" y="0" width="188" height="128" rx="22" fill="#1060A0" filter="url(#sheet-shadow)"/>
      <text x="236" y="50" class="hex-light">#1060A0</text>
      <text x="236" y="82" fill="#D0E0F0" style="font:600 15px Arial;">Harbor Blue</text>
      <text x="236" y="106" fill="#D0E0F0" style="font:500 13px Arial;">Light logo text</text>

      <rect x="428" y="0" width="188" height="128" rx="22" fill="#0070E0" filter="url(#sheet-shadow)"/>
      <text x="450" y="50" class="hex-light">#0070E0</text>
      <text x="450" y="82" fill="#D0E0F0" style="font:600 15px Arial;">Electric Azure</text>
      <text x="450" y="106" fill="#D0E0F0" style="font:500 13px Arial;">Glow/accent</text>

      <rect x="642" y="0" width="188" height="128" rx="22" fill="#70A0C0" filter="url(#sheet-shadow)"/>
      <text x="664" y="50" class="hex-light">#70A0C0</text>
      <text x="664" y="82" fill="#FFFFFF" style="font:600 15px Arial;">Circuit Blue</text>
      <text x="664" y="106" fill="#FFFFFF" style="font:500 13px Arial;">Circuit traces</text>

      <rect x="856" y="0" width="188" height="128" rx="22" fill="#D0E0F0" filter="url(#sheet-shadow)"/>
      <text x="878" y="50" class="hex-dark">#D0E0F0</text>
      <text x="878" y="82" fill="#445066" style="font:600 15px Arial;">Ice Trace</text>
      <text x="878" y="106" fill="#445066" style="font:500 13px Arial;">Highlights</text>

      <rect x="1070" y="0" width="188" height="128" rx="22" fill="#F0F0F0" filter="url(#sheet-shadow)"/>
      <text x="1092" y="50" class="hex-dark">#F0F0F0</text>
      <text x="1092" y="82" fill="#445066" style="font:600 15px Arial;">Core Glow</text>
      <text x="1092" y="106" fill="#445066" style="font:500 13px Arial;">White spark</text>
    </g>
  </g>

  <g transform="translate(60 693)">
    <text x="0" y="0" class="section">Solution UI Palette</text>
    <g transform="translate(0 30)">
      <rect x="0" y="0" width="156" height="116" rx="18" fill="#081225"/>
      <text x="18" y="46" class="hex-light">#081225</text>
      <text x="18" y="78" fill="#D0E0F0" style="font:600 14px Arial;">Ink</text>

      <rect x="178" y="0" width="156" height="116" rx="18" fill="#172033"/>
      <text x="196" y="46" class="hex-light">#172033</text>
      <text x="196" y="78" fill="#D0E0F0" style="font:600 14px Arial;">Body text</text>

      <rect x="356" y="0" width="156" height="116" rx="18" fill="#5D6678"/>
      <text x="374" y="46" class="hex-light">#5D6678</text>
      <text x="374" y="78" fill="#FFFFFF" style="font:600 14px Arial;">Muted text</text>

      <rect x="534" y="0" width="156" height="116" rx="18" fill="#F5F7FB" stroke="#D8DEE9" stroke-width="2"/>
      <text x="552" y="46" class="hex-dark">#F5F7FB</text>
      <text x="552" y="78" fill="#445066" style="font:600 14px Arial;">Canvas</text>

      <rect x="712" y="0" width="156" height="116" rx="18" fill="#FFFFFF" stroke="#D8DEE9" stroke-width="2"/>
      <text x="730" y="46" class="hex-dark">#FFFFFF</text>
      <text x="730" y="78" fill="#445066" style="font:600 14px Arial;">Surface</text>

      <rect x="890" y="0" width="156" height="116" rx="18" fill="#0F766E"/>
      <text x="908" y="46" class="hex-light">#0F766E</text>
      <text x="908" y="78" fill="#D1FAE5" style="font:600 14px Arial;">Success</text>

      <rect x="1068" y="0" width="156" height="116" rx="18" fill="#9A3412"/>
      <text x="1086" y="46" class="hex-light">#9A3412</text>
      <text x="1086" y="78" fill="#FFEDD5" style="font:600 14px Arial;">Warning</text>

      <rect x="1246" y="0" width="156" height="116" rx="18" fill="#B91C1C"/>
      <text x="1264" y="46" class="hex-light">#B91C1C</text>
      <text x="1264" y="78" fill="#FEE2E2" style="font:600 14px Arial;">Risk</text>
    </g>
  </g>

  <g transform="translate(60 865)">
    <text x="0" y="0" class="section">Use Rules</text>
    <text x="0" y="38" class="small">Use Janova Serve POS for the product. Keep Janova Technologies for the parent company.</text>
    <text x="0" y="66" class="small">Use the blue logo on white/light surfaces and the light logo on dark navy, receipt footers, and dark POS shells.</text>
    <text x="0" y="94" class="small">Keep the glow white, circuit traces light blue, and avoid replacing the core palette with unrelated accent colors.</text>
    <text x="0" y="122" class="small">Primary files: public/images/janova-serve-pos-logo.svg, janova-serve-pos-blue.svg, janova-serve-pos-light.svg, plus PNG exports.</text>
  </g>
</svg>
